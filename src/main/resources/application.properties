# 1. Настройки подключения к PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/user_service_db
spring.datasource.username=postgres
spring.datasource.password=root

# 2. Поведение при создании таблиц (соответствует hbm2ddl.auto = update)
spring.jpa.hibernate.ddl-auto=update

# 3. Настройки SQL-диалекта (Spring Boot обычно определяет сам, но лучше зафиксировать)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 4. Отображение и форматирование SQL-запросов в консоли
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 5. Регистрация сущностей (<mapping class="..."/> больше не нужна)
# Spring Boot автоматически сканирует все классы с аннотацией @Entity
# в пакете, где находится ваш Main-класс, и во всех его подпакетах.
